<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TechEnglish</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div id="app">
    <div id="login-screen" class="screen">
      <div class="login-box">
        <div class="logo">
          <span class="logo-icon">⚡</span>
          <span class="logo-text">TechEnglish</span>
        </div>
        <p class="login-sub">IT English conversation simulator</p>
        <input type="password" id="password-input" placeholder="Password" autocomplete="current-password" />
        <button id="login-btn" class="btn-primary">Enter</button>
        <p id="login-error" class="error-msg"></p>
      </div>
    </div>

    <div id="main-screen" class="screen hidden">
      <header class="header">
        <div class="logo small">
          <span class="logo-icon">⚡</span>
          <span class="logo-text">TechEnglish</span>
        </div>
        <nav class="nav">
          <button class="nav-btn active" data-view="practice">Practice</button>
          <button class="nav-btn" data-view="history">History</button>
        </nav>
        <button id="logout-btn" class="btn-ghost">Logout</button>
      </header>

      <div id="view-practice" class="view">
        <div id="scenario-select" class="scenario-select">
          <h1 class="page-title">Choose your scenario</h1>
          <p class="page-sub">10–15 minute conversation session</p>
          <div id="scenario-cards" class="scenario-cards"></div>
        </div>

        <div id="chat-area" class="chat-area hidden">
          <div class="chat-header">
            <button id="back-btn" class="btn-ghost">← Back</button>
            <div class="chat-meta">
              <span id="scenario-label" class="scenario-badge"></span>
              <span id="session-timer" class="timer">00:00</span>
            </div>
            <button id="end-session-btn" class="btn-end">End & Get Feedback</button>
          </div>

          <div id="messages" class="messages"></div>

          <div class="input-area">
            <textarea
              id="user-input"
              placeholder="Type your response in English... (Enter to send, Shift+Enter for new line)"
              rows="3"
            ></textarea>
            <div class="input-actions">
              <span class="input-hint">Or type <kbd>feedback</kbd> to get feedback anytime</span>
              <button id="send-btn" class="btn-send">Send →</button>
            </div>
          </div>
        </div>
      </div>

      <div id="view-history" class="view hidden">
        <h1 class="page-title">Session history</h1>
        <div id="history-list" class="history-list"></div>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
